<!DOCTYPE html>
<html>
<head>
  <title>VpsPack SaaS</title>
</head>
<body>
  <h1>Painel</h1>

  <button onclick="createUser()">Criar Usuário</button>

  <script>
    function createUser() {
      fetch('/create-user', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username: 'teste' })
      })
    }
  </script>
</body>
</html>
